name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    name: Build darwin (arm64 + amd64, universal dylib)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build release archives
        run: scripts/build-release.sh "$GITHUB_REF_NAME"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin
          path: dist/*

  build-linux:
    name: Build linux (amd64 + arm64, static supervisor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install aarch64 cross toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu
      - name: Build release archives
        run: scripts/build-release.sh "$GITHUB_REF_NAME"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/*

  release:
    name: Publish GitHub release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Merge checksums
        run: |
          cd dist
          cat checksums-*.txt > checksums.txt
          rm checksums-*.txt
          ls -la
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "rca $GITHUB_REF_NAME" \
            --generate-notes
